name: wealthflow
description: "SWP Tracker - Systematic Withdrawal Plan Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <5.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  fl_chart: ^0.68.0
  go_router: ^14.0.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2
  # Firebase
  firebase_core: ^3.8.1
  cloud_firestore: ^5.6.0
  firebase_auth: ^5.4.1
  # Social Login
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.4
  # Animations
  flutter_animate: ^4.5.0
  # Bill Splitter (100% free, on-device)
  google_mlkit_text_recognition: ^0.15.1
  image_picker: ^1.1.2
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
